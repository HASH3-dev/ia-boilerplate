services:
  postgres-test:
    image: postgres:16-alpine
    container_name: genemunology-api-postgres-test
    environment:
      POSTGRES_DB: genemunology_test
      POSTGRES_USER: genemunology
      POSTGRES_PASSWORD: genemunology
    ports:
      - "54329:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U genemunology -d genemunology_test"]
      interval: 2s
      timeout: 5s
      retries: 30
    tmpfs:
      - /var/lib/postgresql/data

  test-runner:
    build:
      context: ../../../..
      dockerfile: apps/api/containers/test/Dockerfile
    environment:
      NODE_ENV: test
      DB_URI: postgresql://genemunology:genemunology@postgres-test:5432/genemunology_test
      TEST_DB_URI: postgresql://genemunology:genemunology@postgres-test:5432/genemunology_test
      BACKEND_JWT_SECRET: test-backend-jwt-secret
      DB_SCHEMA: public
      TEST_SUITE_MODE: ${TEST_SUITE_MODE:-full}
    depends_on:
      postgres-test:
        condition: service_healthy
